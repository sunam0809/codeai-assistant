services:
  - type: web
    name: codeai-assistant
    env: node
    region: singapore
    plan: free
    buildCommand: npm install -g pnpm@9 && pnpm install --no-frozen-lockfile && NODE_ENV=production pnpm --filter @workspace/codeai run build && pnpm --filter @workspace/api-server run build
    startCommand: node --enable-source-maps artifacts/api-server/dist/index.mjs
    healthCheckPath: /api/healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: SESSION_SECRET
        generateValue: true
      - key: GROK_API_KEY
        sync: false
      - key: DATABASE_URL
        sync: false

# Note: Create a PostgreSQL database separately in the Render dashboard
# and set DATABASE_URL env var manually.
