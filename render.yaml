services:
  - type: web
    name: codeai-assistant
    env: node
    region: singapore
    plan: free
    buildCommand: npm install -g pnpm && pnpm install --frozen-lockfile && pnpm --filter @workspace/codeai run build && pnpm --filter @workspace/api-server run build
    startCommand: node artifacts/api-server/dist/index.mjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true
      - key: GROK_API_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
    healthCheckPath: /api/healthz

databases:
  - name: codeai-db
    plan: free
    region: singapore
